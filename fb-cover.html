<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Be+Vietnam+Pro:wght@500;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:820px; height:312px; overflow:hidden; }
  .cover {
    width:820px; height:312px; position:relative; overflow:hidden;
    background:
      radial-gradient(circle at 88% 30%, rgba(245,158,11,.30), transparent 45%),
      radial-gradient(circle at 70% 90%, rgba(16,185,129,.18), transparent 45%),
      linear-gradient(125deg, #DC2626 0%, #b91c1c 38%, #7f1d1d 100%);
    font-family:'Be Vietnam Pro', sans-serif;
  }
  /* decorative hanzi */
  .hz { position:absolute; font-family:'Baloo 2'; font-weight:800; color:rgba(250,250,249,.07); user-select:none; }
  .hz1 { font-size:230px; top:-50px; left:18%; }
  .hz2 { font-size:130px; bottom:-30px; left:2%; }
  .hz3 { font-size:90px;  top:18px; left:46%; color:rgba(245,158,11,.18); }

  .content { position:absolute; left:56px; top:0; height:100%; width:480px;
             display:flex; flex-direction:column; justify-content:center; z-index:3; }
  .badge { display:inline-flex; align-items:center; gap:8px; align-self:flex-start;
           background:rgba(250,250,249,.14); border:1px solid rgba(250,250,249,.25);
           color:#FAFAF9; font-weight:600; font-size:15px; padding:6px 14px; border-radius:999px;
           backdrop-filter:blur(4px); margin-bottom:16px; }
  .badge .dot { width:8px; height:8px; border-radius:50%; background:#10B981; box-shadow:0 0 8px #10B981; }
  h1 { font-family:'Baloo 2'; font-weight:800; color:#FAFAF9; font-size:46px; line-height:1.08;
       letter-spacing:-.5px; text-shadow:0 3px 14px rgba(0,0,0,.28); }
  h1 .hl { color:#F59E0B; }
  .sub { margin-top:14px; display:flex; gap:10px; flex-wrap:wrap; }
  .chip { background:rgba(250,250,249,.95); color:#1F2937; font-weight:700; font-size:15px;
          padding:7px 15px; border-radius:10px; box-shadow:0 4px 12px rgba(0,0,0,.18); }
  .web { margin-top:20px; color:#FAFAF9; font-weight:700; font-size:19px; letter-spacing:.3px;
         display:flex; align-items:center; gap:8px; }
  .web .g { color:#FDE68A; }

  .mascot-wrap { position:absolute; right:30px; bottom:0; top:0; width:330px; z-index:2;
                 display:flex; align-items:center; justify-content:center; }
  .glow { position:absolute; width:300px; height:300px; border-radius:50%;
          background:radial-gradient(circle, rgba(245,158,11,.55), transparent 65%); filter:blur(6px); }
  .mascot { position:relative; height:290px; filter:drop-shadow(0 10px 24px rgba(0,0,0,.35)); }

  .spark { position:absolute; color:#FDE68A; z-index:3; font-size:22px; opacity:.9;
           text-shadow:0 0 10px rgba(253,230,138,.8); }
  .s1 { top:40px; right:300px; } .s2 { bottom:60px; right:60px; font-size:16px; }
  .s3 { top:90px; right:40px; font-size:28px; }
</style>
</head>
<body>
  <div class="cover">
    <div class="hz hz1">汉</div>
    <div class="hz hz2">字</div>
    <div class="hz hz3">学</div>

    <div class="content">
      <span class="badge"><span class="dot"></span>hanzigenz.com</span>
      <h1>Học tiếng Trung<br>cùng <span class="hl">Bé Rồng</span> 🐉</h1>
      <div class="sub">
        <span class="chip">HSK · HSKK</span>
        <span class="chip">Gia sư AI</span>
        <span class="chip">Flashcard</span>
      </div>
      <div class="web">🌐 <span class="g">hanzigenz.com</span></div>
    </div>

    <div class="mascot-wrap">
      <div class="glow"></div>
      <img class="mascot" src="assets/outfits/basic/01-hoc-si.webp" alt="Bé Rồng">
    </div>
    <span class="spark s1">✦</span>
    <span class="spark s2">✦</span>
    <span class="spark s3">✦</span>
  </div>
</body>
</html>
