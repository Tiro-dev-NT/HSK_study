<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Be+Vietnam+Pro:wght@500;600;700;800&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1080px; height:1080px; overflow:hidden; }
  .post {
    width:1080px; height:1080px; position:relative; overflow:hidden;
    background:
      radial-gradient(circle at 85% 12%, rgba(245,158,11,.35), transparent 40%),
      radial-gradient(circle at 12% 88%, rgba(16,185,129,.20), transparent 42%),
      linear-gradient(160deg, #DC2626 0%, #b91c1c 45%, #7f1d1d 100%);
    font-family:'Be Vietnam Pro', sans-serif; color:#FAFAF9;
    display:flex; flex-direction:column; align-items:center;
    padding:64px 70px 56px;
  }
  .hz { position:absolute; font-family:'Baloo 2'; font-weight:800; color:rgba(250,250,249,.06); user-select:none; }
  .hzA { font-size:520px; top:-120px; right:-60px; }
  .hzB { font-size:300px; bottom:-110px; left:-40px; color:rgba(245,158,11,.10); }

  .top { position:relative; z-index:3; text-align:center; }
  .kicker { display:inline-flex; align-items:center; gap:10px;
            background:#F59E0B; color:#1F2937; font-weight:800; font-size:26px;
            padding:11px 26px; border-radius:999px; letter-spacing:.5px;
            box-shadow:0 8px 22px rgba(0,0,0,.28); }
  h1 { font-family:'Baloo 2'; font-weight:800; font-size:78px; line-height:1.04;
       margin-top:26px; letter-spacing:-1px; text-shadow:0 4px 18px rgba(0,0,0,.30); }
  h1 .n { color:#FDE68A; }

  .reward { position:relative; z-index:3; margin-top:24px; text-align:center;
            background:rgba(250,250,249,.97); color:#1F2937; border-radius:24px;
            padding:22px 44px; box-shadow:0 14px 34px rgba(0,0,0,.30);
            border:3px solid #F59E0B; }
  .reward .lbl { font-weight:700; font-size:25px; color:#b91c1c; }
  .reward .big { font-family:'Baloo 2'; font-weight:800; font-size:56px; color:#DC2626; line-height:1; margin-top:4px; }
  .reward .gift { font-size:46px; }

  .mid { position:relative; z-index:3; flex:1; display:flex; align-items:center;
         justify-content:center; gap:24px; width:100%; }
  .mascot-wrap { position:relative; display:flex; align-items:center; justify-content:center; }
  .glow { position:absolute; width:430px; height:430px; border-radius:50%;
          background:radial-gradient(circle, rgba(245,158,11,.55), transparent 65%); filter:blur(8px); }
  .mascot { position:relative; height:420px; filter:drop-shadow(0 14px 30px rgba(0,0,0,.40)); }
  .feats { display:flex; flex-direction:column; gap:16px; }
  .feat { background:rgba(250,250,249,.14); border:1px solid rgba(250,250,249,.25);
          backdrop-filter:blur(4px); border-radius:16px; padding:16px 22px;
          font-weight:700; font-size:27px; display:flex; align-items:center; gap:14px; white-space:nowrap; }
  .feat .e { font-size:30px; }

  .bottom { position:relative; z-index:3; width:100%; text-align:center; }
  .cta { background:#10B981; color:#fff; font-weight:800; font-size:34px;
         padding:20px 40px; border-radius:18px; display:inline-block;
         box-shadow:0 12px 30px rgba(16,185,129,.40); }
  .cta .q { color:#FDE68A; }
  .web { margin-top:22px; font-weight:800; font-size:30px; letter-spacing:.5px; }
  .web .g { color:#FDE68A; }

  .spark { position:absolute; color:#FDE68A; z-index:3; text-shadow:0 0 12px rgba(253,230,138,.9); }
  .s1 { top:120px; left:70px; font-size:34px; } .s2 { top:300px; right:80px; font-size:26px; }
  .s3 { bottom:250px; left:90px; font-size:24px; }
</style>
</head>
<body>
  <div class="post">
    <div class="hz hzA">学</div>
    <div class="hz hzB">汉</div>
    <span class="spark s1">✦</span>
    <span class="spark s2">✦</span>
    <span class="spark s3">✦</span>

    <div class="top">
      <span class="kicker">🐉 TUYỂN BETA TESTER</span>
      <h1>Tuyển <span class="n">10 người</span><br>test app học tiếng Trung</h1>
    </div>

    <div class="reward">
      <div class="lbl">🎁 Quyền lợi cho người tham gia</div>
      <div class="big">TẶNG GÓI PRO 1 NĂM</div>
    </div>

    <div class="mid">
      <div class="mascot-wrap">
        <div class="glow"></div>
        <img class="mascot" src="assets/outfits/basic/01-hoc-si.webp" alt="Bé Rồng">
      </div>
      <div class="feats">
        <div class="feat"><span class="e">📚</span> HSK · HSKK</div>
        <div class="feat"><span class="e">🤖</span> Gia sư AI</div>
        <div class="feat"><span class="e">🎤</span> Chấm nói &amp; viết</div>
        <div class="feat"><span class="e">🃏</span> Flashcard SRS</div>
      </div>
    </div>

    <div class="bottom">
      <div class="cta">Comment <span class="q">"Mình tham gia"</span> để đăng ký</div>
      <div class="web">🌐 <span class="g">hanzigenz.com</span></div>
    </div>
  </div>
</body>
</html>
