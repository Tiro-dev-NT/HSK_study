    <!-- PAGE: BAN DO HSK -->
    <section class="page active" id="page-ban-do-hsk">

      <!-- Readiness Dashboard (injected by BanDoHsk.renderReadiness) -->
      <div id="bdhReadiness"></div>

      <!-- Goal modal -->
      <div id="bdhGoalModal" class="modal-overlay" onclick="if(event.target===this)BanDoHsk.closeGoalModal()">
        <div class="modal bdh-goal-modal">
          <button class="modal-close" onclick="BanDoHsk.closeGoalModal()">✕</button>
          <h2 class="bdh-gm-title">🎯 Đặt mục tiêu thi</h2>
          <div class="bdh-gm-field">
            <label class="bdh-gm-label">Cấp HSK mục tiêu</label>
            <div class="bdh-gm-level-row" id="bdhGoalLevelBtns">
              <button class="bdh-gm-lv" data-lv="1" onclick="BanDoHsk._goalSelectLv(1)">HSK 1</button>
              <button class="bdh-gm-lv" data-lv="2" onclick="BanDoHsk._goalSelectLv(2)">HSK 2</button>
              <button class="bdh-gm-lv" data-lv="3" onclick="BanDoHsk._goalSelectLv(3)">HSK 3</button>
              <button class="bdh-gm-lv" data-lv="4" onclick="BanDoHsk._goalSelectLv(4)">HSK 4</button>
              <button class="bdh-gm-lv" data-lv="5" onclick="BanDoHsk._goalSelectLv(5)">HSK 5</button>
              <button class="bdh-gm-lv" data-lv="6" onclick="BanDoHsk._goalSelectLv(6)">HSK 6</button>
            </div>
          </div>
          <div class="bdh-gm-field">
            <label class="bdh-gm-label" for="bdhGoalDate">Ngày thi dự kiến</label>
            <input type="date" id="bdhGoalDate" class="bdh-gm-input"/>
          </div>
          <div class="bdh-gm-field">
            <label class="bdh-gm-label">Phút học / ngày (tùy chọn)</label>
            <div class="bdh-gm-min-row" id="bdhGoalMinBtns">
              <button class="bdh-gm-min" data-min="15" onclick="BanDoHsk._goalSelectMin(15)">15 phút</button>
              <button class="bdh-gm-min" data-min="30" onclick="BanDoHsk._goalSelectMin(30)">30 phút</button>
              <button class="bdh-gm-min" data-min="60" onclick="BanDoHsk._goalSelectMin(60)">60 phút</button>
            </div>
          </div>
          <div class="bdh-gm-actions">
            <button class="btn-primary" onclick="BanDoHsk.saveGoalModal()">Lưu mục tiêu</button>
            <button class="btn-outline" onclick="BanDoHsk.closeGoalModal()">Hủy</button>
          </div>
        </div>
      </div>

      <!-- Header -->
      <div class="bdh-header">
        <div class="bdh-header-text">
          <h1 class="bdh-title">Bản đồ HSK</h1>
          <p class="bdh-sub" id="bdhSub">Hành trình chinh phục tiếng Trung — từng cấp độ</p>
        </div>
        <div class="bdh-overall-wrap">
          <div class="bdh-overall-dots" id="bdhOverallDots"></div>
          <div class="bdh-overall-label" id="bdhOverallLabel"></div>
        </div>
      </div>

      <!-- Mascot tip (desktop) -->
      <div class="bdh-mascot-tip" id="bdhMascotTip" style="display:none">
        <img src="assets/icon-soft.webp" class="bdh-mascot-img" alt="Bé Rồng" width="48" height="48" loading="lazy"/>
        <div class="bdh-mascot-bubble" id="bdhMascotBubble">Tiếp tục nào! 🐉</div>
      </div>

      <!-- Bands container -->
      <div class="bdh-bands" id="bdhBands">
        <!-- Injected by BanDoHsk.render() -->
      </div>

      <!-- HSKK speaking milestones (Phase Y — sắp ra mắt) -->
      <div class="bdh-hskk">
        <div class="bdh-hskk-head">
          <span class="bdh-hskk-icon">🎤</span>
          <div>
            <div class="bdh-hskk-title">Mốc kỹ năng Nói — HSKK</div>
            <div class="bdh-hskk-sub">Thi nói mô phỏng · AI chấm phát âm &amp; nội dung</div>
          </div>
          <span class="bdh-hskk-tag">Sắp ra mắt</span>
        </div>
        <div class="bdh-hskk-list">
          <div class="bdh-hskk-item"><span class="bdh-hskk-badge">Sơ cấp</span><span class="bdh-hskk-when">sau HSK 2</span></div>
          <div class="bdh-hskk-item"><span class="bdh-hskk-badge">Trung cấp</span><span class="bdh-hskk-when">sau HSK 4</span></div>
          <div class="bdh-hskk-item"><span class="bdh-hskk-badge">Cao cấp</span><span class="bdh-hskk-when">sau HSK 6</span></div>
        </div>
      </div>

      <!-- Sticky bottom CTA (mobile) -->
      <div class="bdh-cta-bar" id="bdhCtaBar">
        <div class="bdh-cta-info">
          <div class="bdh-cta-level" id="bdhCtaLevel">HSK 1</div>
          <div class="bdh-cta-stat"  id="bdhCtaStat">0 / 150 từ</div>
        </div>
        <button class="bdh-cta-btn" id="bdhCtaBtn" onclick="Router.navigateTo('learn')">Tiếp tục học →</button>
      </div>

    </section>
