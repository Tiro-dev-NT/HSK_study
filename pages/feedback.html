      <!-- PAGE: FEEDBACK -->
      <section class="page active" id="page-feedback">
        <div class="page-header">
          <h1>💬 Góp ý &amp; Đánh giá</h1>
          <p style="color:var(--text2);font-size:14px">Chia sẻ ý kiến giúp chúng tôi cải thiện ứng dụng!</p>
        </div>
        <!-- Rating -->
        <div class="feedback-section">
          <div class="fb-section-title">⭐ Đánh giá tổng quát</div>
          <div class="fb-stars" id="fbStars">
            <span class="fb-star" data-v="1">★</span>
            <span class="fb-star" data-v="2">★</span>
            <span class="fb-star" data-v="3">★</span>
            <span class="fb-star" data-v="4">★</span>
            <span class="fb-star" data-v="5">★</span>
          </div>
        </div>
        <!-- Category -->
        <div class="feedback-section">
          <div class="fb-section-title">🏷️ Loại góp ý</div>
          <div class="fb-category-row">
            <button class="fb-cat active" data-cat="feature">💡 Tính năng</button>
            <button class="fb-cat" data-cat="bug">🐛 Báo lỗi</button>
            <button class="fb-cat" data-cat="content">📚 Nội dung</button>
            <button class="fb-cat" data-cat="ui">🎨 Giao diện</button>
            <button class="fb-cat" data-cat="other">📦 Khác</button>
          </div>
        </div>
        <!-- Message -->
        <div class="feedback-section">
          <div class="fb-section-title">📝 Nội dung góp ý</div>
          <textarea id="fbMessage" class="fb-textarea" placeholder="Chia sẻ ý kiến, đề xuất của bạn..." rows="5"></textarea>
        </div>
        <!-- Submit -->
        <button class="btn-primary w-full" id="fbSubmit">🚀 Gửi góp ý</button>
        <div class="fb-success" id="fbSuccess" style="display:none">
          <div class="fb-success-icon">🎉</div>
          <div>Cảm ơn bạn đã góp ý!</div>
        </div>
        <!-- Previous feedbacks -->
        <div class="fb-history" id="fbHistory"></div>
      </section>
