    <!-- PAGE: HOME -->
    <section class="page active" id="page-home">
      <div class="page-header">
        <h1 data-vi="Chào mừng trở lại 👋" data-en="Welcome back 👋">Chào mừng trở lại 👋</h1>
        <p data-vi="Hôm nay học gì?" data-en="What to study today?">Hôm nay học gì?</p>
      </div>
      <!-- Stats row -->
      <div class="stats-row">
        <div class="stat-card">
          <div class="stat-num" id="statLearned">0</div>
          <div class="stat-label" data-vi="Đã học" data-en="Learned">Đã học</div>
        </div>
        <div class="stat-card streak-card" id="streakCard">
          <div class="stat-num"><span id="statStreak">0</span><span class="streak-fire">🔥</span></div>
          <div class="stat-label" data-vi="Chuỗi ngày" data-en="Day streak">Chuỗi ngày</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="statDue">0</div>
          <div class="stat-label" data-vi="Cần ôn" data-en="Due today">Cần ôn</div>
        </div>
      </div>
      <!-- XP Progress bar -->
      <div class="xp-bar-wrap" id="xpBarWrap">
        <div class="xp-bar-header">
          <span class="xp-label">⚡ <span id="xpTotal">0</span> XP</span>
          <span class="xp-level-label" id="xpLevelLabel">Cấp 1</span>
        </div>
        <div class="xp-bar-track"><div class="xp-bar-fill" id="xpBarFill" style="width:0%"></div></div>
        <div class="xp-bar-footer"><span id="xpThisWeek">+0 XP tuần này</span></div>
      </div>
      <!-- Streak calendar (last 7 days) -->
      <div class="streak-calendar" id="streakCalendar"></div>
      <!-- Word of the Day -->
      <div class="wotd-card" id="wotdCard">
        <div class="wotd-header">
          <span class="wotd-badge">📖 Từ vựng hôm nay</span>
        </div>
        <div class="wotd-body">
          <div class="wotd-hanzi-area">
            <div class="wotd-hanzi" id="wotdHanzi"></div>
            <div id="wotdWriter" style="margin:0 auto"></div>
          </div>
          <div class="wotd-info">
            <div class="wotd-pinyin" id="wotdPinyin"></div>
            <div class="wotd-meaning" id="wotdMeaning"></div>
            <div class="wotd-example" id="wotdExample"></div>
          </div>
          <div class="wotd-actions">
            <button class="wotd-btn" id="wotdTTS" title="Phát âm">🔊 Phát âm</button>
            <button class="wotd-btn wotd-btn-detail" id="wotdDetail">📖 Xem chi tiết</button>
          </div>
        </div>
      </div>

      <!-- Progress Analytics -->
      <div class="analytics-section" id="analyticsSection">
        <h2 data-vi="Phân tích tiến độ" data-en="Progress Analytics">Phân tích tiến độ</h2>
        <div class="analytics-grid">
          <!-- HSK Readiness -->
          <div class="analytics-card" id="analyticsReadiness">
            <div class="ac-title" data-vi="HSK Readiness" data-en="HSK Readiness">HSK Readiness</div>
            <div class="ac-body" id="readinessChart"></div>
          </div>
          <!-- Weak Words -->
          <div class="analytics-card" id="analyticsWeak">
            <div class="ac-title" data-vi="Từ yếu nhất" data-en="Weakest Words">Từ yếu nhất</div>
            <div class="ac-body" id="weakWordsList"></div>
          </div>
          <!-- XP Trends -->
          <div class="analytics-card" id="analyticsXP">
            <div class="ac-title" data-vi="XP 14 ngày qua" data-en="XP Last 14 Days">XP 14 ngày qua</div>
            <div class="ac-body" id="xpTrendChart"></div>
          </div>
        </div>
      </div>

      <!-- Quest Widget (Phase L) -->
      <div class="quest-widget" id="home-quest-widget-wrap">
        <div class="quest-widget-header">
          <span class="quest-widget-title">⚔️ Nhiệm vụ hôm nay</span>
          <span class="quest-widget-count badge" id="quest-widget-count">0/3</span>
          <a class="quest-widget-link" data-page="quests" href="#" onclick="Router.navigateTo('quests');return false;">Xem tất cả →</a>
        </div>
        <div id="quest-widget-list"></div>
      </div>

      <h2 data-vi="Chọn cấp độ HSK" data-en="Choose HSK Level">Chọn cấp độ HSK</h2>
      <div class="level-grid" id="levelGrid"></div>
    </section>
