<div class="topics-container">
  <!-- Screen 1: Topic Grid -->
  <div id="topicGrid" class="topic-grid-screen">
    <div class="topic-header">
      <h1>Học theo chủ đề</h1>
      <p class="topic-subtitle">Khám phá từ vựng theo các chủ đề thực tế</p>
    </div>

    <div class="topic-filter">
      <label>Lọc theo cấp độ:</label>
      <select id="topicLevelFilter">
        <option value="9">Tất cả (HSK 1-9)</option>
        <option value="1">HSK 1</option>
        <option value="2">HSK 1-2</option>
        <option value="3">HSK 1-3</option>
        <option value="4">HSK 1-4</option>
        <option value="5">HSK 1-5</option>
        <option value="6">HSK 1-6</option>
        <option value="7">HSK 1-7</option>
        <option value="8">HSK 1-8</option>
      </select>
    </div>

    <div id="topicCardsGrid" class="topic-cards-grid">
      <!-- Cards rendered by JS -->
    </div>
  </div>

  <!-- Screen 2: Topic Detail -->
  <div id="topicDetail" class="topic-detail-screen" style="display:none;">
    <div class="topic-detail-header">
      <button class="topic-back-btn" onclick="Topics.backToGrid()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
        Quay lại
      </button>
      <h2 id="topicDetailTitle"></h2>
      <p id="topicDetailCount" class="topic-detail-count"></p>
    </div>

    <div class="topic-actions">
      <button id="topicLearnNew" class="btn-primary" onclick="Topics.startSession('new')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M12 5v14M5 12h14"/>
        </svg>
        Học từ mới
      </button>
      <button id="topicReview" class="btn-secondary" onclick="Topics.startSession('review')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M1 4v6h6M23 20v-6h-6"/>
          <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/>
        </svg>
        Ôn từ đã biết
      </button>
    </div>

    <div id="topicVocabGrid" class="topic-vocab-grid">
      <!-- Vocab cards rendered by JS -->
    </div>
  </div>
</div>
