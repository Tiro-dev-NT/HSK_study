<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Be+Vietnam+Pro:wght@500;600;700;800&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { width:1080px; height:1920px; overflow:hidden; }
  .post {
    width:1080px; height:1920px; position:relative; overflow:hidden;
    background:
      radial-gradient(circle at 85% 8%, rgba(245,158,11,.35), transparent 38%),
      radial-gradient(circle at 12% 92%, rgba(16,185,129,.20), transparent 40%),
      linear-gradient(165deg, #DC2626 0%, #b91c1c 50%, #7f1d1d 100%);
    font-family:'Be Vietnam Pro', sans-serif; color:#FAFAF9;
    display:flex; flex-direction:column; align-items:center;
    padding:150px 80px 120px;
  }
  .hz { position:absolute; font-family:'Baloo 2'; font-weight:800; color:rgba(250,250,249,.06); user-select:none; }
  .hzA { font-size:560px; top:60px; right:-70px; }
  .hzB { font-size:380px; bottom:120px; left:-60px; color:rgba(245,158,11,.10); }

  .kicker { display:inline-flex; align-items:center; gap:12px;
            background:#F59E0B; color:#1F2937; font-weight:800; font-size:34px;
            padding:14px 36px; border-radius:999px; letter-spacing:.5px;
            box-shadow:0 10px 26px rgba(0,0,0,.30); position:relative; z-index:3; }
  h1 { font-family:'Baloo 2'; font-weight:800; font-size:104px; line-height:1.05;
       margin-top:38px; letter-spacing:-1.5px; text-align:center;
       text-shadow:0 5px 22px rgba(0,0,0,.32); position:relative; z-index:3; }
  h1 .n { color:#FDE68A; }

  .reward { position:relative; z-index:3; margin-top:44px; text-align:center;
            background:rgba(250,250,249,.97); color:#1F2937; border-radius:30px;
            padding:30px 60px; box-shadow:0 18px 40px rgba(0,0,0,.32);
            border:4px solid #F59E0B; }
  .reward .lbl { font-weight:700; font-size:34px; color:#b91c1c; }
  .reward .big { font-family:'Baloo 2'; font-weight:800; font-size:78px; color:#DC2626; line-height:1; margin-top:8px; }

  .mascot-wrap { position:relative; z-index:3; margin-top:30px; display:flex; align-items:center; justify-content:center; }
  .glow { position:absolute; width:540px; height:540px; border-radius:50%;
          background:radial-gradient(circle, rgba(245,158,11,.55), transparent 65%); filter:blur(10px); }
  .mascot { position:relative; height:520px; filter:drop-shadow(0 18px 36px rgba(0,0,0,.42)); }

  .feats { position:relative; z-index:3; display:grid; grid-template-columns:1fr 1fr; gap:22px; width:100%; margin-top:20px; }
  .feat { background:rgba(250,250,249,.14); border:1px solid rgba(250,250,249,.25);
          backdrop-filter:blur(4px); border-radius:22px; padding:24px 26px;
          font-weight:700; font-size:36px; display:flex; align-items:center; gap:16px; }
  .feat .e { font-size:40px; }

  .bottom { position:relative; z-index:3; width:100%; text-align:center; margin-top:auto; }
  .cta { background:#10B981; color:#fff; font-weight:800; font-size:46px;
         padding:28px 44px; border-radius:24px; display:block;
         box-shadow:0 14px 34px rgba(16,185,129,.42); }
  .cta .q { color:#FDE68A; }
  .bio { margin-top:30px; font-weight:800; font-size:42px; letter-spacing:.5px; }
  .bio .g { color:#FDE68A; }

  .spark { position:absolute; color:#FDE68A; z-index:3; text-shadow:0 0 14px rgba(253,230,138,.9); }
  .s1 { top:210px; left:90px; font-size:46px; } .s2 { top:520px; right:100px; font-size:34px; }
  .s3 { bottom:520px; left:110px; font-size:36px; } .s4 { bottom:360px; right:120px; font-size:30px; }
</style>
</head>
<body>
  <div class="post">
    <div class="hz hzA">学</div>
    <div class="hz hzB">汉</div>
    <span class="spark s1">✦</span><span class="spark s2">✦</span>
    <span class="spark s3">✦</span><span class="spark s4">✦</span>

    <span class="kicker">🐉 TUYỂN BETA TESTER</span>
    <h1>Tuyển <span class="n">10 người</span><br>test app học tiếng Trung</h1>

    <div class="reward">
      <div class="lbl">🎁 Quyền lợi cho người tham gia</div>
      <div class="big">TẶNG GÓI PRO 1 NĂM</div>
    </div>

    <div class="mascot-wrap">
      <div class="glow"></div>
      <img class="mascot" src="assets/outfits/basic/01-hoc-si.webp" alt="Bé Rồng">
    </div>

    <div class="feats">
      <div class="feat"><span class="e">📚</span> HSK · HSKK</div>
      <div class="feat"><span class="e">🤖</span> Gia sư AI</div>
      <div class="feat"><span class="e">🎤</span> Chấm phát âm &amp; viết</div>
      <div class="feat"><span class="e">🃏</span> Flashcard SRS</div>
    </div>

    <div class="bottom">
      <div class="cta">Comment <span class="q">"Mình tham gia"</span> để đăng ký</div>
      <div class="bio">👇 Link &amp; đăng ký ở <span class="g">Bio</span></div>
    </div>
  </div>
</body>
</html>
